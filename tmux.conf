# Enable mouse support (scroll, pane select, resize)
set -g mouse on

# Status bar
set -g status on
set -g status-interval 1
set -g status-left " pane #P "
set -g status-right "#(cd #{pane_current_path} && git branch --show-current 2>/dev/null | sed 's/.*/  &/') · #{b:pane_current_path} · #{pane_current_command} · %H:%M %d %b "
set -g status-right-length 80
set -g status-justify left

# Theme: adapt to macOS dark/light mode at startup
# Re-apply with: prefix + T
if-shell "defaults read -g AppleInterfaceStyle 2>/dev/null | grep -q Dark" \
  'set -g pane-active-border-style fg=#00D7EB; set -g pane-border-style fg=#444444; set -g status-style bg=#0D0F18,fg=#FFFAF3; set -g status-left-style bg=#00D7EB,fg=#0D0F18,bold' \
  'set -g pane-active-border-style fg=#4171AE; set -g pane-border-style fg=#D6D6D6; set -g status-style bg=#E8E8E8,fg=#4D4D4C; set -g status-left-style bg=#4171AE,fg=#FFFFFF,bold'

# Manual theme refresh (prefix + T)
bind T run-shell ' \
  if defaults read -g AppleInterfaceStyle 2>/dev/null | grep -q Dark; then \
    tmux set -g pane-active-border-style fg=#00D7EB; \
    tmux set -g pane-border-style fg=#444444; \
    tmux set -g status-style bg=#0D0F18,fg=#FFFAF3; \
    tmux set -g status-left-style bg=#00D7EB,fg=#0D0F18,bold; \
  else \
    tmux set -g pane-active-border-style fg=#4171AE; \
    tmux set -g pane-border-style fg=#D6D6D6; \
    tmux set -g status-style bg=#E8E8E8,fg=#4D4D4C; \
    tmux set -g status-left-style bg=#4171AE,fg=#FFFFFF,bold; \
  fi'
