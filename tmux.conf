# Status bar
set -g status on
set -g status-interval 1
set -g status-left " pane #P "
set -g status-right "#(cd #{pane_current_path} && git branch --show-current 2>/dev/null | sed 's/.*/  &/') · #{b:pane_current_path} · #{pane_current_command} · %H:%M %d %b "
set -g status-right-length 80
set -g status-justify left

# Theme: adapt to macOS dark/light mode at startup
# Re-apply with: prefix + T
if-shell "defaults read -g AppleInterfaceStyle 2>/dev/null | grep -q Dark" \
  'set -g pane-active-border-style fg=colour39; set -g pane-border-style fg=colour238; set -g status-style bg=colour235,fg=colour245; set -g status-left-style bg=colour39,fg=colour232,bold' \
  'set -g pane-active-border-style fg=colour27; set -g pane-border-style fg=colour250; set -g status-style bg=colour255,fg=colour240; set -g status-left-style bg=colour27,fg=colour255,bold'

# Manual theme refresh (prefix + T)
bind T run-shell ' \
  if defaults read -g AppleInterfaceStyle 2>/dev/null | grep -q Dark; then \
    tmux set -g pane-active-border-style fg=colour39; \
    tmux set -g pane-border-style fg=colour238; \
    tmux set -g status-style bg=colour235,fg=colour245; \
    tmux set -g status-left-style bg=colour39,fg=colour232,bold; \
  else \
    tmux set -g pane-active-border-style fg=colour27; \
    tmux set -g pane-border-style fg=colour250; \
    tmux set -g status-style bg=colour255,fg=colour240; \
    tmux set -g status-left-style bg=colour27,fg=colour255,bold; \
  fi'
